services:
  - type: web
    name: akashic-backend
    runtime: node
    plan: free
    buildCommand: cd artifacts/server && pnpm install && pnpm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        scope: runtime
        sync: false
      - key: GEMINI_API_KEY
        scope: runtime
        sync: false
      - key: FRONTEND_URL
        value: http://localhost:3000
      - key: PORT
        value: "3000"

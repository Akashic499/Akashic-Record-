kind = "web"
previewPath = "/"
title = "Akashic Record"
version = "1.0.0"
id = "artifacts/akashic-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20251

[services.development]
run = "pnpm --filter @workspace/akashic-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/akashic-web", "run", "build" ]
publicDir = "artifacts/akashic-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20251"
BASE_PATH = "/"

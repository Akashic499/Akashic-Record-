kind = "mobile"
previewPath = "/"
title = "Akashic Record"
version = "1.0.0"
id = "artifacts/akashic"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20398

[services.development]
run = "pnpm --filter @workspace/akashic run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/akashic", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/akashic", "run", "serve" ]

[services.env]
PORT = "20398"
BASE_PATH = "/"
